server:
  port: 9090
  tomcat:
    connection-timeout: 60000
    keep-alive-timeout: 60000
    max-keep-alive-requests: 100
    threads:
      max: 200
      min-spare: 10

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${MOVIE_DB_URL:jdbc:postgresql://localhost:5432/movie_db}
    username: ${MOVIE_DB_USERNAME:postgres}
    password: ${MOVIE_DB_PASSWORD:change-me}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

app:
  outbox:
    cleanup-interval-ms: 3600000

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "movie:"

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

  auth:
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.movie.backend: DEBUG
    org.springframework: INFO

file:
  upload-path: ${FILE_UPLOAD_PATH:./uploaded/}
  domain: ${FILE_DOMAIN:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET:replace-this-with-a-local-secret-at-least-64-bytes-long}
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

pagehelper:
  helperDialect: postgresql
