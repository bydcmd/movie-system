server:
  port: 9090
  tomcat:
    connection-timeout: 60000
    keep-alive-timeout: 60000
    max-keep-alive-requests: 100
    threads:
      max: 200
      min-spare: 10

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${MOVIE_DB_URL:jdbc:postgresql://localhost:5432/movie_db}
    username: ${MOVIE_DB_USERNAME:postgres}
    password: ${MOVIE_DB_PASSWORD:change-me}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: movie-backend
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      view-history: movie-view-history
      rating: movie-rating-events
      comment: movie-comment-events
      comment-like: movie-comment-like-events
      favorite: movie-favorite-events
      watched: movie-watched-events
      favorite-folder-action: movie-favorite-folder-action-events
      search: movie-search-events
      user-register: movie-user-register-events
      user-login: movie-user-login-events
    consumer:
      view-history-group: movie-backend-view-history
    outbox:
      poll-interval-ms: 36000000
      batch-size: 100
      max-retries: 10
      base-delay-ms: 5000
      max-delay-ms: 120000
      processing-timeout-ms: 60000
      cleanup-interval-ms: 36000000
      cleanup-retention-ms: 604800000
      cleanup-batch-size: 500

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "movie:"

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

  auth:
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.movie.backend: DEBUG
    org.springframework: INFO

file:
  upload-path: ${FILE_UPLOAD_PATH:./uploaded/}
  domain: ${FILE_DOMAIN:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET:replace-this-with-a-local-secret-at-least-64-bytes-long}
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

pagehelper:
  helperDialect: postgresql
