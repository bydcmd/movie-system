server:
  port: 9090
  tomcat:
    connection-timeout: 60000  # 连接超时时间 60 秒
    keep-alive-timeout: 60000  # Keep-Alive 超时时间 60 秒
    max-keep-alive-requests: 100  # 最大 Keep-Alive 请求数
    threads:
      max: 200  # 最大线程数
      min-spare: 10  # 最小空闲线程数

spring:
  datasource:
    # Primary (PostgreSQL)
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost/movie_db?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: postgres
    password: Hadoop@123
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # password:  # Add password if needed
      timeout: 10000ms  # 增加到 10 秒，适应远程服务器网络延迟
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
        # 连接超时和命令超时配置
        shutdown-timeout: 100ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:8.136.198.88:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: movie-backend
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      view-history: movie-view-history
      rating: movie-rating-events
      comment: movie-comment-events
      comment-like: movie-comment-like-events
      favorite: movie-favorite-events
      watched: movie-watched-events
      favorite-folder-action: movie-favorite-folder-action-events
      search: movie-search-events
      user-register: movie-user-register-events
      user-login: movie-user-login-events
    consumer:
      view-history-group: movie-backend-view-history
    outbox:
      poll-interval-ms: 36000000
      batch-size: 100
      max-retries: 10
      base-delay-ms: 5000
      max-delay-ms: 120000
      processing-timeout-ms: 60000
      cleanup-interval-ms: 36000000
      cleanup-retention-ms: 604800000
      cleanup-batch-size: 500

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour (in milliseconds)
      cache-null-values: false  # Do not cache null values
      use-key-prefix: true
      key-prefix: "movie:"

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

  auth:
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Logging
logging:
  level:
    com.movie.backend: DEBUG
    org.springframework: INFO

file:
  upload-path: D:/project/backend/uploaded/
  domain: http://localhost:8080

# JWT Configuration
jwt:
  secret: ThisIsAVeryLongSecretKeyForMovieProjectThatIsAtLeast64BytesLongToSatisfyHS512SecurityRequirement
  access-token-expiration: 3600000  # 1 小时 (单位: 毫秒)
  refresh-token-expiration: 2592000000  # 30 天 (单位: 毫秒)
pagehelper:
  helperDialect: postgresql
