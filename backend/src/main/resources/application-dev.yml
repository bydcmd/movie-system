server:
  port: 8080
  tomcat:
    connection-timeout: 60000  # 连接超时时间 60 秒
    keep-alive-timeout: 60000  # Keep-Alive 超时时间 60 秒
    max-keep-alive-requests: 100  # 最大 Keep-Alive 请求数
    threads:
      max: 200  # 最大线程数
      min-spare: 10  # 最小空闲线程数

spring:
  datasource:
    # Primary (MySQL)
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://8.136.198.88:3306/movie_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: Hadoop@123
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  # Redis
  data:
    redis:
      host: 8.136.198.88
      port: 6379
      database: 0
      # password:  # Add password if needed
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:8.136.198.88:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: movie-backend
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      view-history: movie-view-history
      rating: movie-rating-events
      comment: movie-comment-events
      comment-like: movie-comment-like-events
      favorite: movie-favorite-events
    consumer:
      view-history-group: movie-backend-view-history

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour (in milliseconds)
      cache-null-values: false  # Do not cache null values
      use-key-prefix: true
      key-prefix: "movie:"

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Logging
logging:
  level:
    com.movie.backend: DEBUG
    org.springframework: INFO

file:
  upload-path: D:/project/backend/uploaded/
  domain: http://localhost:8080

# JWT Configuration
jwt:
  secret: ThisIsAVeryLongSecretKeyForMovieProjectThatIsAtLeast64BytesLongToSatisfyHS512SecurityRequirement
  access-token-expiration: 3600000  # 1 小时 (单位: 毫秒)
  refresh-token-expiration: 2592000000  # 30 天 (单位: 毫秒)
