spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/movie_db_test
    username: test
    password: test
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 0
      min-idle: 0
      max-active: 2
      test-on-borrow: false
      test-while-idle: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  cache:
    type: simple
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    listener:
      auto-startup: false

app:
  kafka:
    topics:
      view-history: movie-view-history-test
      rating: movie-rating-events-test
      comment: movie-comment-events-test
      comment-like: movie-comment-like-events-test
      favorite: movie-favorite-events-test
      watched: movie-watched-events-test
      favorite-folder-action: movie-favorite-folder-action-events-test
      search: movie-search-events-test
      user-register: movie-user-register-events-test
      user-login: movie-user-login-events-test
    consumer:
      view-history-group: movie-backend-view-history-test
    outbox:
      poll-interval-ms: 36000000
      cleanup-interval-ms: 36000000

jwt:
  secret: TestOnlyJwtSecretKeyForMovieSystemThatIsAtLeast64BytesLongForHS512
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

hive:
  datasource:
    driver-class-name: org.apache.hive.jdbc.HiveDriver
    url: jdbc:hive2://127.0.0.1:10000/default
    username: hive
    password:
